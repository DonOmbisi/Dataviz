[global]
# Disable usage stats collection
showWarningOnDirectExecution = false

[server]
# Server settings - Optimized for performance
headless = true
address = "0.0.0.0"
port = 8501
baseUrlPath = ""
enableCORS = false
enableXsrfProtection = false  # Disable for faster local development
maxUploadSize = 100           # Reduced from 200MB for faster uploads
maxMessageSize = 100          # Limit WebSocket message size

# Performance optimizations
enableStaticServing = false   # Disabled - no static folder present
fileWatcherType = "none"      # Disable file watching for better performance

# Auto-reload settings (disable in production)
runOnSave = false             # Disable auto-reload for stability
allowRunOnSave = false

[browser]
# Browser settings
gatherUsageStats = false

[theme]
# App theme configuration
base = "dark"
primaryColor = "#00d4ff"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#262730"
textColor = "#fafafa"
font = "sans serif"

[runner]
# Script execution optimizations
fastReruns = false        # Disable for stability, enable if needed
enforceSerializableSessionState = false  # Allow complex objects for speed

[mapbox]
# Mapbox token (if using mapbox maps)
# token = "your_mapbox_token_here"
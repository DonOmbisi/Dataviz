[global]
# Disable usage stats collection
showWarningOnDirectExecution = false

[server]
# Server settings
headless = true
address = "0.0.0.0"
port = 5000
baseUrlPath = ""
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 200

# Auto-reload settings
runOnSave = true
allowRunOnSave = true

[browser]
# Browser settings
gatherUsageStats = false

[theme]
# App theme configuration
base = "dark"
primaryColor = "#00d4ff"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#262730"
textColor = "#fafafa"
font = "sans serif"

[mapbox]
# Mapbox token (if using mapbox maps)
# token = "your_mapbox_token_here"